<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Menú Digital - Viewer</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

  <style>
    /* -------------------------
       THEME: cambia aquí la paleta por defecto
       valores posibles: dark | light | gold
       ------------------------- */
    :root { --theme: dark; }

    /* PALETA */
    :root[data-theme="dark"] {
      --bg: #0f0f0f;
      --card-bg: #121212;
      --muted: #9aa0a6;
      --text: #ffffff;
      --accent: #c5a059;
      --accent-2: #7bd389;
    }
    :root[data-theme="light"] {
      --bg: #f7f7f8;
      --card-bg: #ffffff;
      --muted: #6b7280;
      --text: #0b1220;
      --accent: #1f6feb;
      --accent-2: #ff7a59;
    }
    :root[data-theme="gold"] {
      --bg: #0b0b0b;
      --card-bg: linear-gradient(135deg,#1a1a1a 0%, #0f0f0f 100%);
      --muted: #bfb1a0;
      --text: #fffaf0;
      --accent: #e0b24a;
      --accent-2: #d46a6a;
    }

    /* Aplicar tema inicial */
    html { height:100%; }
    body { margin:0; min-height:100%; font-family:Inter, sans-serif; background:var(--bg); color:var(--text); transition:background .25s ease; }

    /* Contenedor principal */
    #pdf-content { max-width:900px; margin: 30px auto 120px; padding: 24px; }

    /* Header */
    .header {
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      padding: 28px; border-radius: 12px; margin-bottom: 18px;
      background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    }
    .brand {
      display:flex; align-items:center; gap:14px;
    }
    .brand .logo {
      width:72px; height:72px; border-radius:12px; overflow:hidden; display:flex; align-items:center; justify-content:center;
      background:var(--accent); color:#111; font-weight:700; font-family:Playfair Display, serif; font-size:1.4rem;
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    }
    .brand h1 { margin:0; font-family:Playfair Display, serif; font-size:1.6rem; color:var(--accent); }
    .brand p { margin:0; color:var(--muted); font-size:0.85rem; }

    /* Controles flotantes */
    .controls-container {
      position: fixed; right: 28px; bottom: 28px; display:flex; flex-direction:column; gap:12px; z-index:1200;
      align-items:flex-end;
    }
    .fab {
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:10px 14px; border-radius:999px; cursor:pointer; border:none; outline:none;
      background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      color:var(--text); box-shadow: 0 8px 24px rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
    }
    .fab.pdf { background: linear-gradient(90deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4)); color:#fff; }
    .fab.lang { background: var(--accent); color:#111; font-weight:700; }

    /* Selector idiomas (panel) */
    .lang-panel {
      position: fixed; right: 28px; bottom: 92px; display:flex; flex-direction:column; gap:8px; z-index:1199;
      background: linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.25));
      padding:8px; border-radius:10px; box-shadow: 0 10px 30px rgba(0,0,0,0.45);
      display:none;
    }
    .lang-panel.active { display:flex; }
    .lang-item { display:flex; align-items:center; gap:10px; padding:6px 10px; border-radius:8px; cursor:pointer; min-width:140px; }
    .lang-item:hover { background: rgba(255,255,255,0.02); }
    .lang-flag { width:36px; height:24px; border-radius:4px; overflow:hidden; flex:0 0 36px; }
    .lang-flag img { width:100%; height:100%; object-fit:cover; display:block; }
    .lang-label { color:var(--text); font-weight:600; font-size:0.95rem; }

    /* Menu container */
    #menu-container { display:flex; flex-direction:column; gap:22px; }

    .categoria-titulo {
      text-align:center; font-family:Playfair Display, serif; font-size:1.8rem; color:var(--accent);
      margin: 18px 0 6px;
    }

    /* Grid de platos */
    .platos-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:18px; }
    .plato-card {
      display:flex; gap:12px; align-items:stretch; padding:12px; border-radius:14px;
      background: var(--card-bg); border: 1px solid rgba(255,255,255,0.03); overflow:hidden;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .plato-card:hover { transform: translateY(-6px); box-shadow: 0 18px 40px rgba(0,0,0,0.5); }

    .plato-media { width:140px; height:120px; flex:0 0 140px; border-radius:10px; overflow:hidden; background:#111; display:flex; align-items:center; justify-content:center; }
    .plato-media img { width:100%; height:100%; object-fit:cover; display:block; }

    .plato-body { flex:1; display:flex; flex-direction:column; justify-content:space-between; padding:6px 0; }
    .plato-nombre { font-weight:700; font-size:1.05rem; margin:0; color:var(--text); }
    .plato-desc { margin:6px 0 0; color:var(--muted); font-size:0.92rem; line-height:1.3; }
    .plato-footer { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
    .plato-precio { color:var(--accent); font-weight:800; font-size:1.05rem; }

    /* Responsive tweaks */
    @media (max-width:640px) {
      .plato-media { width:110px; height:90px; }
      .platos-grid { grid-template-columns: 1fr; }
      #pdf-content { padding:12px; margin:12px; }
    }
  </style>
</head>
<body>
  <div id="pdf-content" role="main" aria-live="polite">
    <header class="header">
      <div class="brand">
        <div class="logo" id="logo-letter">M</div>
        <div>
          <h1 id="restaurant-title">Cargando...</h1>
          <p id="subtitle">Nuestro Menú</p>
        </div>
      </div>
      <div style="display:flex; gap:12px; align-items:center;">
        <div id="meta-info" style="text-align:right; color:var(--muted); font-size:0.9rem;"></div>
      </div>
    </header>

    <main id="menu-container"></main>
  </div>

  <div class="controls-container" aria-hidden="false">
    <button class="fab pdf" id="btn-pdf" title="Descargar PDF">PDF</button>
    <button class="fab lang" id="btn-lang" title="Idiomas">
      <span id="current-flag-wrap" style="display:inline-block; width:28px; height:20px; overflow:hidden; border-radius:4px; margin-right:8px;">
        <img id="current-flag" src="assets/flags/es.png" alt="flag" style="width:100%; height:100%; object-fit:cover;">
      </span>
      <span style="font-weight:700;">Idioma</span>
    </button>
  </div>

  <div id="lang-panel" class="lang-panel" role="menu" aria-hidden="true"></div>

  <script>
    // -------------------------
    // CONFIG
    // -------------------------
    const FLAG_DIR = 'assets/flags/';
    const FLAG_MAP = { es:'es.png', en:'en.png', fr:'fr.png', it:'it.png', de:'de.png', pt:'pt.png', cn:'cn.png', sa:'sa.png' };

    // Repositorio de GitHub para descargar los menús
    const REPO_OWNER = 'wiissdeveloperapps-hub';
    const REPO_NAME = 'menuforgeviews';

    // Aplicar tema inicial
    (function applyInitialTheme() {
      const theme = document.documentElement.getAttribute('data-theme') || getComputedStyle(document.documentElement).getPropertyValue('--theme').trim() || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();

    // -------------------------
    // Datos
    // -------------------------
    let menuData = null;

    // Inicializa la app una vez tenemos los datos del menú
    function initMenuApp(data) {
      menuData = data;
      // GUARDAMOS EN SESIÓN: Si recarga, lo recupera rápido
      sessionStorage.setItem('cachedMenu', JSON.stringify(menuData));

      buildLangPanel();
      const defaultLang = menuData.defaultLang || 'es';
      changeLanguage(defaultLang);
    }

    // Decodifica hash seguro legacy
    function decodeHash(hash) {
      try {
        return JSON.parse(decodeURIComponent(escape(atob(hash))));
      } catch (e) {
        return null;
      }
    }

    // Pre-carga imágenes (soporta data: y rutas relativas)
    function preloadImages(urls = []) {
      const promises = urls.map(u => new Promise(res => {
        if (!u) return res();
        const img = new Image();
        const src = resolveImageUrl(u);
        if (!src.startsWith('data:')) img.crossOrigin = 'anonymous';
        img.onload = () => res();
        img.onerror = () => { console.warn('Imagen no cargada:', src); res(); };
        img.src = src;
      }));
      return Promise.all(promises);
    }

    function resolveImageUrl(url) {
      if (!url) return '';
      if (url.startsWith('data:')) return url;
      if (url.startsWith('http://') || url.startsWith('https://')) return url;
      return new URL(url, window.location.href).href;
    }

    // Construye el menú en DOM
    async function renderMenu(lang = 'es') {
      if (!menuData) return;
      const content = menuData.traducciones ? (menuData.traducciones[lang] || menuData.traducciones['es'] || menuData) : menuData;

      document.getElementById('restaurant-title').textContent = content.nombre || menuData.nombre || 'Restaurante';
      document.getElementById('subtitle').textContent = content.subtitulo || menuData.subtitulo || '';

      const logoLetter = (content.nombre || menuData.nombre || 'M').trim().charAt(0).toUpperCase();
      document.getElementById('logo-letter').textContent = logoLetter;

      const meta = content.meta?.note || menuData.meta?.note || '';
      document.getElementById('meta-info').textContent = meta;

      const imageUrls = [];
      (content.categorias || []).forEach(cat => {
        (cat.platos || []).forEach(p => {
          const raw = p.imagen || p.urlImagen || p.imagenBase64 || '';
          if (raw) imageUrls.push(raw);
        });
      });

      await preloadImages(imageUrls);

      const container = document.getElementById('menu-container');
      container.innerHTML = '';

      (content.categorias || []).forEach(cat => {
        const title = document.createElement('h2');
        title.className = 'categoria-titulo';
        title.textContent = cat.nombre || '';
        container.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'platos-grid';

        (cat.platos || []).forEach(p => {
          const card = document.createElement('article');
          card.className = 'plato-card';
          card.setAttribute('role','article');

          const media = document.createElement('div');
          media.className = 'plato-media';

          const raw = p.imagen || p.urlImagen || p.imagenBase64 || '';
          const src = resolveImageUrl(raw);

          if (src) {
            const img = document.createElement('img');
            img.src = src;
            if (!src.startsWith('data:')) img.crossOrigin = 'anonymous';
            img.alt = p.nombre || '';
            media.appendChild(img);
          } else {
            const ph = document.createElement('div');
            ph.style.width = '100%'; ph.style.height = '100%'; ph.style.display='flex'; ph.style.alignItems='center'; ph.style.justifyContent='center';
            ph.style.color = 'var(--muted)'; ph.textContent = 'Sin imagen';
            media.appendChild(ph);
          }

          const body = document.createElement('div');
          body.className = 'plato-body';

          const name = document.createElement('h3');
          name.className = 'plato-nombre';
          name.textContent = p.nombre || '';

          const desc = document.createElement('p');
          desc.className = 'plato-desc';
          desc.textContent = p.descripcion || '';

          const footer = document.createElement('div');
          footer.className = 'plato-footer';

          const price = document.createElement('div');
          price.className = 'plato-precio';
          price.textContent = (p.precio !== undefined && p.precio !== null) ? `${p.precio}€` : '';

          footer.appendChild(price);
          body.appendChild(name);
          body.appendChild(desc);
          body.appendChild(footer);

          card.appendChild(media);
          card.appendChild(body);
          grid.appendChild(card);
        });
        container.appendChild(grid);
      });
    }

    function buildLangPanel() {
      const panel = document.getElementById('lang-panel');
      panel.innerHTML = '';
      const langs = menuData?.traducciones ? Object.keys(menuData.traducciones) : ['es','en'];
      if (!langs.includes('es')) langs.unshift('es');

      langs.forEach(code => {
        const item = document.createElement('div');
        item.className = 'lang-item';
        item.onclick = () => { changeLanguage(code); };

        const flagWrap = document.createElement('div');
        flagWrap.className = 'lang-flag';
        const img = document.createElement('img');
        const file = FLAG_MAP[code] || `${code}.png`;
        img.src = `${FLAG_DIR}${file}`;
        img.alt = code;
        flagWrap.appendChild(img);

        const label = document.createElement('div');
        label.className = 'lang-label';
        const labelText = (menuData?.traducciones?.[code]?.meta?.languageName) || (code.toUpperCase());
        label.textContent = labelText;

        item.appendChild(flagWrap);
        item.appendChild(label);
        panel.appendChild(item);
      });
    }

    function changeLanguage(code) {
      const file = FLAG_MAP[code] || `${code}.png`;
      document.getElementById('current-flag').src = `${FLAG_DIR}${file}`;
      document.getElementById('lang-panel').classList.remove('active');
      document.getElementById('lang-panel').setAttribute('aria-hidden','true');
      renderMenu(code);
    }

    function descargarPDF() {
      const element = document.getElementById('pdf-content');
      const controls = document.querySelector('.controls-container');
      if (controls) controls.style.display = 'none';

      const opt = {
        margin: 10,
        filename: 'menu-restaurante.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#0f0f0f' },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      const imgs = Array.from(document.querySelectorAll('#menu-container img'));
      const loads = imgs.map(img => new Promise(res => {
        if (img.complete) return res();
        img.addEventListener('load', () => res());
        img.addEventListener('error', () => res());
      }));

      Promise.all(loads).then(() => {
        html2pdf().set(opt).from(element).save().then(() => {
          if (controls) controls.style.display = 'flex';
        }).catch(err => {
          console.error('Error generando PDF:', err);
          if (controls) controls.style.display = 'flex';
        });
      });
    }

    document.getElementById('btn-lang').addEventListener('click', () => {
      const panel = document.getElementById('lang-panel');
      panel.classList.toggle('active');
      panel.setAttribute('aria-hidden', panel.classList.contains('active') ? 'false' : 'true');
    });
    document.getElementById('btn-pdf').addEventListener('click', descargarPDF);

    // -------------------------
    // LÓGICA PRINCIPAL DE CARGA (CORREGIDA)
    // -------------------------
    window.addEventListener('load', () => {
      const hash = window.location.hash.substring(1);

      // CASO 1: Descargar desde GitHub remoto
      if (hash.startsWith('remote:')) {
        const id = hash.replace('remote:', '');
        // AQUÍ ESTÁ EL AJUSTE: La ruta correcta es /contents/menus/
        const rawJsonUrl = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/contents/menus/${id}.json`;
        
        document.getElementById('restaurant-title').textContent = 'Cargando carta...';

        fetch(rawJsonUrl)
          .then(res => {
            if (!res.ok) throw new Error('Menú no encontrado en servidor');
            return res.json();
          })
          .then(data => initMenuApp(data))
          .catch(err => {
            console.error('Error cargando menú:', err);
            const cached = sessionStorage.getItem('cachedMenu');
            if (cached) {
              initMenuApp(JSON.parse(cached));
            } else {
              document.getElementById('restaurant-title').textContent = 'El menú ha expirado o no existe';
            }
          });
        return;
      }

      // CASO 2: Descomprimir desde Pako
      if (hash.startsWith('pako:')) {
        try {
          const b64Data = hash.replace('pako:', '');
          const strData = atob(b64Data);
          const charData = strData.split('').map(x => x.charCodeAt(0));
          const binData = new Uint8Array(charData);
          const data = pako.inflate(binData);
          const jsonStr = new TextDecoder().decode(data);
          initMenuApp(JSON.parse(jsonStr));
        } catch (e) {
          console.error('Error Pako:', e);
          document.getElementById('restaurant-title').textContent = 'Error abriendo menú offline';
        }
        return;
      }

      // CASO 3: Lógica antigua
      if (hash) {
        const data = decodeHash(hash);
        if (data) {
          initMenuApp(data);
        } else {
          document.getElementById('restaurant-title').textContent = 'Formato de menú inválido';
        }
      } else {
        const cached = sessionStorage.getItem('cachedMenu');
        if (cached) {
          initMenuApp(JSON.parse(cached));
        } else {
          document.getElementById('restaurant-title').textContent = 'Escanea un QR para empezar';
        }
      }
    });
  </script>
</body>
</html>
