<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú Digital Premium</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2=family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ========================================================
           VARIABLES GLOBALES Y TEMAS (Premium UI)
        ======================================================== */
        :root {
            --bg-color: #f4f6f8;
            --text-main: #1a1a1a;
            --text-muted: #6c757d;
            --primary: #007bff;
            --primary-hover: #0056b3;
            --card-bg: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --border-color: #eaeaea;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.03);
            --shadow-md: 0 12px 24px rgba(0,0,0,0.06);
            --shadow-lg: 0 25px 50px rgba(0,0,0,0.15);
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        body.dark-mode {
            --bg-color: #0f0f11;
            --text-main: #f1f1f1;
            --text-muted: #a0a0a5;
            --primary: #007bff;
            --primary-hover: #3395ff;
            --card-bg: #1c1c1f;
            --glass-bg: rgba(22, 22, 24, 0.85);
            --border-color: #2a2a2d;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.3);
            --shadow-md: 0 12px 24px rgba(0,0,0,0.5);
            --shadow-lg: 0 25px 50px rgba(0,0,0,0.7);
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }

        /* ========================================================
           HEADER CON GLASSMORPHISM ULTRA-UX
        ======================================================== */
        header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.4s ease;
        }

        #btn-back {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 123, 255, 0.1);
            color: var(--primary);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: none;
        }
        #btn-back:hover { background: var(--primary); color: white; transform: scale(1.05); }

        #restaurant-logo {
            max-height: 80px;
            max-width: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            display: inline-block;
        }

        #restaurant-name {
            font-size: 2.2em;
            margin: 10px 0 5px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .restaurant-meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: var(--text-muted);
        }
        .restaurant-meta-item { display: flex; align-items: center; gap: 5px; }
        .restaurant-meta a { color: inherit; text-decoration: none; transition: color 0.2s; }
        .restaurant-meta a:hover { color: var(--primary); }
        .meta-icon { width: 16px; height: 16px; fill: currentColor; }

        /* BUSCADOR */
        .search-container {
            max-width: 400px;
            margin: 0 auto 15px auto;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 12px 20px 12px 40px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95em;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1); }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 18px;
            height: 18px;
        }

        /* ACTIONS */
        .top-buttons { display: flex; gap: 12px; justify-content: center; align-items: center; }
        .lang-selector-wrap {
            display: flex; align-items: center; gap: 6px; padding: 8px 12px;
            border-radius: 12px; background: var(--card-bg); border: 1px solid var(--border-color);
            cursor: pointer; transition: all 0.3s ease;
        }
        .lang-flag { width: 24px; height: 18px; border-radius: 4px; object-fit: cover; }
        #language-selector {
            border: none; background: transparent; font-size: 1em; font-weight: 600;
            color: var(--text-main); font-family: inherit; cursor: pointer; outline: none; appearance: none;
        }
        .btn {
            padding: 10px 16px; border-radius: 12px; border: none; cursor: pointer;
            font-weight: 700; font-family: inherit; display: flex; align-items: center;
            gap: 6px; transition: transform 0.2s ease;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-pdf { background: #dc3545; color: white; box-shadow: 0 4px 10px rgba(220, 53, 69, 0.2); }
        .btn-theme {
            background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border-color);
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center; font-size: 1.3em;
            cursor: pointer; transition: transform 0.2s ease;
        }
        .btn-theme:hover { transform: scale(1.05) rotate(5deg); }

        /* NAVEGACIÓN INTELIGENTE DE CATEGORÍAS (SCROLL-SPY) */
        .category-tabs-container {
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            margin-top: 15px;
            display: none;
        }
        .category-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: -15px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .category-tabs::-webkit-scrollbar { display: none; }
        .category-tab {
            padding: 8px 18px;
            border-radius: 20px;
            background-color: var(--card-bg);
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.9em;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
        }
        .category-tab:hover { background-color: var(--border-color); }
        .category-tab.active {
            background-color: var(--primary);
            color: #ffffff !important;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.25);
            transform: translateY(-2px);
        }

        /* ========================================================
           VISTA Y TARJETAS DE PLATOS (Premium UX)
        ======================================================== */
        #main-content { padding: 20px; max-width: 800px; margin: 0 auto; min-height: 70vh; padding-bottom: 100px; }
        #loader { text-align: center; padding: 50px; font-size: 1.5em; color: var(--text-muted); font-weight: 600; }

        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 10px; }
        .menu-card { border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); cursor: pointer; position: relative; height: 220px; }
        .menu-card-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .menu-card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.55); z-index: 2; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; text-align: center; transition: background 0.3s ease; }
        .menu-card:hover .menu-card-img { transform: scale(1.08); }
        .menu-card-title { color: #ffffff; font-size: 2.2em; font-weight: 800; margin: 0; text-transform: uppercase; text-shadow: 0 2px 15px rgba(0,0,0,0.6); }

        .category { margin-bottom: 30px; scroll-margin-top: 260px; } /* Ajuste crítico para el scroll fluido */
        .category-title { font-size: 2em; font-weight: 800; border-bottom: 3px solid var(--primary); padding-bottom: 12px; margin-bottom: 25px; }

        /* Tarjeta de Plato Táctil Estilo UberEats */
        .dish {
            display: flex; gap: 16px; background-color: var(--card-bg); border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm); margin-bottom: 20px; overflow: hidden;
            cursor: pointer; transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.2s ease;
        }
        .dish:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .dish:active { transform: scale(0.99); }
        .dish-img { width: 130px; height: 130px; object-fit: cover; flex-shrink: 0; }
        .dish-details { padding: 16px 16px 16px 0; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .dish:not(:has(.dish-img)) .dish-details { padding-left: 16px; }
        .dish-name { font-size: 1.25em; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.3px; }
        .dish-desc { color: var(--text-muted); margin: 0 0 12px; font-size: 0.95em; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .dish-bottom-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .dish-price { font-size: 1.35em; font-weight: 800; }
        
        .dish-add-btn {
            background: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 24px; font-weight: 700;
            cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .dish-add-btn:hover { background: var(--primary-hover); transform: scale(1.1); }

        .dish-action-icon {
            background: rgba(0, 123, 255, 0.1); color: var(--primary); border-radius: 50%;
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
        }
        .dish:hover .dish-action-icon { background: var(--primary); color: #ffffff; transform: translateX(4px); }
        .dish-source-badge { font-size: 0.7em; background: var(--bg-color); padding: 4px 8px; border-radius: 6px; color: var(--text-muted); }

        .fade-in-slide { opacity: 0; transform: translateY(15px); transition: opacity 0.5s ease, transform 0.5s ease; }
        .fade-in-slide.visible { opacity: 1; transform: translateY(0); }

        /* ========================================================
           MODALES BLUR PREMIUM
        ======================================================== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: var(--card-bg); border-radius: var(--radius-lg); width: 90%; max-width: 420px; max-height: 85vh;
            overflow-y: auto; position: relative; transform: translateY(30px);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); box-shadow: var(--shadow-lg);
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-close {
            position: absolute; top: 16px; right: 16px; background: rgba(0, 0, 0, 0.05); color: var(--text-main);
            border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 1.1em;
            cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;
        }
        body.dark-mode .modal-close { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .modal-close:hover { background: #dc3545; color: white; transform: scale(1.1); }
        
        .modal-img-wrapper { text-align: center; padding-top: 35px; }
        .modal-img { width: 160px; height: 160px; object-fit: cover; border-radius: var(--radius-md); box-shadow: 0 10px 25px rgba(0,0,0,0.12); }
        .modal-body { padding: 25px 35px 35px; text-align: center; }
        .modal-title { font-size: 1.8em; font-weight: 800; margin: 0 0 15px; letter-spacing: -0.5px; }
        .modal-price { font-size: 1.6em; font-weight: 800; color: var(--text-main); display: inline-block; padding: 8px 24px; background: var(--bg-color); border-radius: 12px; margin-bottom: 25px; }
        .modal-desc { color: var(--text-muted); font-size: 1.05em; line-height: 1.6; margin: 0; text-align: left; }

        /* CARRITO / CONFIGURACIONES */
        .cart-fab {
            position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px;
            background-color: var(--primary); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            box-shadow: 0 8px 25px rgba(0, 123, 255, 0.4); cursor: pointer; z-index: 999;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: none;
        }
        .cart-fab:hover { transform: scale(1.08); }
        .cart-badge {
            position: absolute; top: -5px; right: -5px; background-color: #dc3545; color: white;
            border-radius: 50%; width: 24px; height: 24px; font-size: 12px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; border: 2px solid white;
            transition: transform 0.2s ease; transform: scale(0);
        }
        .cart-badge.visible { transform: scale(1); }

        #cart-items-container { max-height: 40vh; overflow-y: auto; margin-top: 20px; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 10px 0; }
        .cart-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid var(--border-color); }
        .cart-item:last-child { border-bottom: none; }
        .cart-item-name { font-weight: 600; flex-grow: 1; margin-right: 10px; }
        .cart-item-controls { display: flex; align-items: center; gap: 8px; user-select: none; }
        .cart-item-quantity { font-weight: 700; min-width: 20px; text-align: center; }
        .cart-item-price { font-weight: 700; color: var(--primary); min-width: 60px; text-align: right; }
        .quantity-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-main); font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #cookie-banner {
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05); padding: 16px 24px; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between; z-index: 9999; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        #cookie-banner.show { transform: translateY(0); }
        .cookie-text { font-size: 0.9em; margin-right: 20px; line-height: 1.4; }
        .btn-cookie { background: var(--primary); color: #fff; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .btn-cookie:hover { background: var(--primary-hover); transform: scale(1.02); }

        /* REGLAS MÓVILES */
        @media (max-width: 480px) {
            header { padding: 12px 10px; }
            #btn-back { top: 12px; left: 10px; width: 38px; height: 38px; }
            #restaurant-logo { max-width: 55px; max-height: 55px; }
            #restaurant-name { font-size: 1.6em; }
            .restaurant-meta { gap: 6px 10px; font-size: 0.8em; }
            .category { scroll-margin-top: 240px; }
            .dish-img { width: 105px; height: 105px; }
            #cookie-banner { flex-direction: column; gap: 12px; text-align: center; }
            .cookie-text { margin-right: 0; }
            .btn-cookie { width: 100%; }
        }
    </style>
</head>

<body>

<header id="header-container" style="display:none;">
    <button id="btn-back" onclick="app.navigateHome()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>

    <img id="restaurant-logo" src="" alt="Logo">
    <h1 id="restaurant-name">Cargando...</h1>
    
    <div id="restaurant-meta" class="restaurant-meta"></div>

    <div class="search-container">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="search-input" class="search-input" placeholder="Buscar platos..." oninput="app.handleSearch(this.value)">
    </div>

    <div id="category-tabs-container" class="category-tabs-container">
        <div id="category-tabs" class="category-tabs"></div>
    </div>

    <div class="top-buttons">
        <div class="lang-selector-wrap">
            <img id="current-flag" class="lang-flag" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <select id="language-selector" aria-label="Selector de idioma"></select>
        </div>
        <button id="btn-pdf" class="btn btn-pdf" onclick="window.print()">📄 PDF</button>
        <button id="btn-theme" class="btn-theme" onclick="app.toggleTheme()">🌙</button>
    </div>
</header>

<div id="main-content">
    <div id="loader">Preparando la experiencia...</div>
</div>

<div id="dish-modal" class="modal-overlay" onclick="app.closeModal(event)">
    <div class="modal-content">
        <button id="modal-close" class="modal-close" onclick="app.closeModal(event, true)">✖</button>
        <div id="modal-img-wrapper" class="modal-img-wrapper">
            <img id="modal-img" class="modal-img" src="" alt="">
        </div>
        <div class="modal-body">
            <h3 id="modal-title" class="modal-title"></h3>
            <div id="modal-price" class="modal-price"></div>
            <p id="modal-desc" class="modal-desc"></p>
        </div>
    </div>
</div>

<div id="cookie-banner">
    <div id="cookie-text" class="cookie-text"></div>
    <button id="cookie-btn" class="btn-cookie" onclick="app.acceptCookies()"></button>
</div>

<div id="cart-fab" class="cart-fab" onclick="app.openCart()">
    🛒
    <span id="cart-badge" class="cart-badge">0</span>
</div>

<div id="cart-modal" class="modal-overlay" onclick="app.closeCart(event)">
    <div class="modal-content">
        <button class="modal-close" onclick="app.closeCart(event, true)">✖</button>
        <div class="modal-body" style="text-align: left;">
            <h3 id="cart-modal-title" class="modal-title" style="text-align: center;"></h3>
            <div id="cart-items-container"></div>
            <div id="cart-total-container" style="text-align: right; font-size: 1.4em; font-weight: 800; margin: 20px 0;">
                <span id="cart-total-label"></span> <span id="cart-total-price">0,00 €</span>
            </div>
            <div id="table-selector-container">
                <label id="cart-table-label" for="table-selector"></label>
                <select id="table-selector" class="search-input" style="width: 100%; margin-top: 5px;"></select>
            </div>
            <button id="send-order-btn" class="btn-cookie" style="width: 100%; margin-top: 20px;" onclick="app.sendOrder()"></button>
        </div>
    </div>
</div>

<script>
const I18N = {

    en: { search: "Search dishes...", back: "Back", results: "Search Results", emptyMenu: "This menu is empty.", emptySearch: "No results found for", cookieMsg: "We use cookies to improve your experience.", cookieBtn: "Accept", cartTitle: "Your Order", cartTotal: "Total:", cartTableLabel: "Select your table:", cartEmpty: "Your order is empty.", tableSelectDefault: "Select" },
    fr: { search: "Rechercher des plats...", back: "Retour", results: "Résultats de recherche", emptyMenu: "Ce menu est vide.", emptySearch: "Aucun résultat pour", cookieMsg: "Nous utilisons des cookies pour améliorer votre expérience.", cookieBtn: "Accepter", cartTitle: "Votre Commande", cartTotal: "Total:", cartTableLabel: "Sélectionnez votre table:", cartEmpty: "Votre commande est vide.", tableSelectDefault: "Sélectionner" },
    it: { search: "Cerca piatti...", back: "Indietro", results: "Risultati della ricerca", emptyMenu: "Questo menu è vuoto.", emptySearch: "Nessun risultato per", cookieMsg: "Utilizziamo i cookie per migliorare la tua esperienza.", cookieBtn: "Accetta", cartTitle: "Il Tuo Ordine", cartTotal: "Totale:", cartTableLabel: "Seleziona il tuo tavolo:", cartEmpty: "Il tuo ordine è vuoto.", tableSelectDefault: "Seleziona" },

const DEFAULT_COVERS = {
    normal: "assets/principal/normal.jpg",
    diario: "assets/principal/diario.jpg",
    especial: "assets/principal/especial.jpg"
};

const app = {
    REPO_OWNER: 'wiissdeveloperapps-hub',
    REPO_NAME: 'menuforgeviews',
    
    data: null,
    currentLang: 'es',
    currentView: 'home', 
    currentMenuId: null,
    searchQuery: '',
    categoryTabsObserver: null,
    cart: [],
    whatsapp: { enabled: false, phone: '', msgLang: 'es' },
    tables: [],

    dom: {
        header: document.getElementById('header-container'),
        content: document.getElementById('main-content'),
        btnBack: document.getElementById('btn-back'),
        logo: document.getElementById('restaurant-logo'),
        name: document.getElementById('restaurant-name'),
        meta: document.getElementById('restaurant-meta'),
        langSelect: document.getElementById('language-selector'),
        currentFlag: document.getElementById('current-flag'),
        searchInput: document.getElementById('search-input'),
        categoryTabsContainer: document.getElementById('category-tabs-container'),
        categoryTabs: document.getElementById('category-tabs'),
        modal: document.getElementById('dish-modal'),
        modalImg: document.getElementById('modal-img'),
        modalImgWrapper: document.getElementById('modal-img-wrapper'),
        modalTitle: document.getElementById('modal-title'),
        modalPrice: document.getElementById('modal-price'),
        modalDesc: document.getElementById('modal-desc'),
        cookieBanner: document.getElementById('cookie-banner'),
        cookieText: document.getElementById('cookie-text'),
        cookieBtn: document.getElementById('cookie-btn'),
        cartFab: document.getElementById('cart-fab'),
        cartBadge: document.getElementById('cart-badge'),
        cartModal: document.getElementById('cart-modal'),
        cartModalTitle: document.getElementById('cart-modal-title'),
        cartItemsContainer: document.getElementById('cart-items-container'),
        cartTotalLabel: document.getElementById('cart-total-label'),
        cartTotalPrice: document.getElementById('cart-total-price'),
        cartTableLabel: document.getElementById('cart-table-label'),
        tableSelector: document.getElementById('table-selector'),
        sendOrderBtn: document.getElementById('send-order-btn')
    },

    async init() {
        this.initTheme();
        this.initCookies();
        
        // Manejador centralizado para delegación de clics en tarjetas de platos
        this.dom.content.addEventListener('click', (e) => {
            const dishCard = e.target.closest('.dish');
            if (!dishCard) return;

            // Si pulsaron específicamente el botón de agregar al carrito, no abrir modal
            if (e.target.closest('.dish-add-btn')) {
                e.stopPropagation();
                const dishId = dishCard.dataset.dishId;
                this.addToCart(dishId);
                return;
            }

            // Si pulsaron en cualquier otro lado de la tarjeta (incluyendo la foto), abrimos detalle
            const dishId = dishCard.dataset.dishId;
            this.openModal(dishId);
        });

        const compressedData = this.getUrlParameter('d');
        if (compressedData) {
            try {
                this.data = this.decompressData(compressedData);
                this.setupRestaurantInfo();
                this.setupLanguages();
                this.setupTables();
                this.navigateHome();
                this.dom.header.style.display = 'block';
            } catch (e) {
                console.error("Error cargando datos:", e);
                this.dom.content.innerHTML = '<div id="loader">Error al cargar el menú.</div>';
            }
        } else {
            this.dom.content.innerHTML = '<div id="loader">No se encontraron datos válidos.</div>';
        }
    },

    initTheme() {
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-mode');
            this.dom.header.querySelector('.btn-theme').textContent = '☀️';
        }
    },

    toggleTheme() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        this.dom.header.querySelector('.btn-theme').textContent = isDark ? '☀️' : '🌙';
    },

    initCookies() {
        if (!localStorage.getItem('cookiesAccepted')) {
            this.updateCookieBannerText();
            this.dom.cookieBanner.classList.add('show');
        }
    },

    acceptCookies() {
        localStorage.setItem('cookiesAccepted', 'true');
        this.dom.cookieBanner.classList.remove('show');
    },

    updateCookieBannerText() {
        const lang = this.currentLang;
        this.dom.cookieText.textContent = I18N[lang].cookieMsg;
        this.dom.cookieBtn.textContent = I18N[lang].cookieBtn;
    },

    decompressData(encoded) {
        const base64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
        const binaryString = atob(base64);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        const decompressed = pako.inflate(bytes, { to: 'string' });
        return JSON.parse(decompressed);
    },

    getUrlParameter(name) {
        const results = new RegExp('[\?&]' + name + '=([^&#]*)').exec(window.location.href);
        return results ? results[1] : null;
    },

    setupRestaurantInfo() {
        const res = this.data.restaurant;
        document.title = res.name;
        this.dom.name.textContent = res.name;
        this.dom.logo.src = res.logo || 'https://via.placeholder.com/150';
        this.dom.logo.style.display = res.logo ? 'inline-block' : 'none';

        if (this.data.whatsapp && this.data.whatsapp.enabled) {
            this.whatsapp = this.data.whatsapp;
        }

        let metaHtml = '';
        if (res.address) {
            metaHtml += `<div class="restaurant-meta-item">
                <svg class="meta-icon" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                <a href="https://maps.google.com/?q=${encodeURIComponent(res.address)}" target="_blank">${res.address}</a>
            </div>`;
        }
        if (res.phone) {
            metaHtml += `<div class="restaurant-meta-item">
                <svg class="meta-icon" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                <a href="tel:${res.phone}">${res.phone}</a>
            </div>`;
        }
        this.dom.meta.innerHTML = metaHtml;
    },

    setupLanguages() {
        const availableLangs = this.data.languages || ['es'];
        this.currentLang = availableLangs[0];
        
        this.dom.langSelect.innerHTML = '';
        availableLangs.forEach(lang => {
            const opt = document.createElement('option');
            opt.value = lang;
            opt.textContent = lang.toUpperCase();
            this.dom.langSelect.appendChild(opt);
        });

        this.updateFlag(this.currentLang);

        this.dom.langSelect.addEventListener('change', (e) => {
            this.currentLang = e.target.value;
            this.updateFlag(this.currentLang);
            this.updateCookieBannerText();
            this.render();
        });
    },

    updateFlag(lang) {
        const flags = { es: 'es', en: 'gb', fr: 'fr', it: 'it', de: 'de', pt: 'pt', cn: 'cn', sa: 'sa' };
        const code = flags[lang] || 'es';
        this.dom.currentFlag.src = `https://flagcdn.com/w40/${code}.png`;
    },

    setupTables() {
        this.tables = this.data.tables || [];
        this.dom.tableSelector.innerHTML = '';
        
        const defOpt = document.createElement('option');
        defOpt.value = '';
        defOpt.textContent = I18N[this.currentLang].tableSelectDefault;
        this.dom.tableSelector.appendChild(defOpt);

        this.tables.forEach(table => {
            const opt = document.createElement('option');
            opt.value = table;
            opt.textContent = table;
            this.dom.tableSelector.appendChild(opt);
        });
    },

    navigateHome() {
        this.currentView = 'home';
        this.currentMenuId = null;
        this.searchQuery = '';
        this.dom.searchInput.value = '';
        this.dom.btnBack.style.display = 'none';
        this.dom.categoryTabsContainer.style.display = 'none';
        this.destroyCategoryTabsObserver();
        this.render();
    },

    navigateMenu(menuId) {
        this.currentView = 'menu';
        this.currentMenuId = menuId;
        this.searchQuery = '';
        this.dom.searchInput.value = '';
        this.dom.btnBack.style.display = 'flex';
        this.render();
    },

    handleSearch(query) {
        this.searchQuery = query.trim().toLowerCase();
        if (this.currentView === 'home' && this.searchQuery !== '') {
            // Si está buscando desde el home, forzar vista global del primer menú
            if (this.data.menus && this.data.menus.length > 0) {
                this.currentView = 'menu';
                this.currentMenuId = this.data.menus[0].id;
                this.dom.btnBack.style.display = 'flex';
            }
        }
        this.render();
    },

    scrollToCategory(catId) {
        const el = document.getElementById(`cat-${catId}`);
        if (el) {
            el.scrollIntoView({ behavior: 'smooth' });
        }
    },

    setupCategoryTabsObserver() {
        this.destroyCategoryTabsObserver();
        
        const sections = document.querySelectorAll('.category');
        const tabs = document.querySelectorAll('.category-tab');
        const container = this.dom.categoryTabs;
        if (sections.length === 0 || tabs.length === 0) return;

        // Opciones optimizadas de visibilidad en viewport
        const options = { root: null, rootMargin: '-260px 0px -40% 0px', threshold: 0 };

        this.categoryTabsObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    tabs.forEach(t => t.classList.remove('active'));
                    const catId = entry.target.id.replace('cat-', '');
                    const activeTab = document.getElementById(`tab-${catId}`);
                    if (activeTab) {
                        activeTab.classList.add('active');
                        // Centrar la pestaña horizontalmente de forma fluida
                        container.scrollTo({
                            left: activeTab.offsetLeft - (container.offsetWidth / 2) + (activeTab.offsetWidth / 2),
                            behavior: 'smooth'
                        });
                    }
                }
            });
        }, options);

        sections.forEach(sec => this.categoryTabsObserver.observe(sec));
    },

    destroyCategoryTabsObserver() {
        if (this.categoryTabsObserver) {
            this.categoryTabsObserver.disconnect();
            this.categoryTabsObserver = null;
        }
    },

    render() {
        this.dom.searchInput.placeholder = I18N[this.currentLang].search;
        
        if (this.currentView === 'home') {
            this.renderHome();
        } else if (this.currentView === 'menu') {
            this.renderMenu();
        }
        
        this.renderIntersectionAnimations();
        this.updateCartFab();
    },

    renderHome() {
        const menus = this.data.menus || [];
        if (menus.length === 0) {
            this.dom.content.innerHTML = `<div id="loader">${I18N[this.currentLang].emptyMenu}</div>`;
            return;
        }

        // Si solo existe un menú, saltar la selección e ir directo
        if (menus.length === 1 && this.searchQuery === '') {
            this.currentView = 'menu';
            this.currentMenuId = menus[0].id;
            this.dom.btnBack.style.display = 'flex';
            this.renderMenu();
            return;
        }

        let html = '<div class="menu-grid">';
        menus.forEach(menu => {
            const title = menu.name[this.currentLang] || menu.name['es'] || '';
            const coverType = menu.coverType || 'normal';
            const coverUrl = menu.coverUrl || DEFAULT_COVERS[coverType] || 'https://via.placeholder.com/400x250';
            
            html += `
                <div class="menu-card fade-in-slide" onclick="app.navigateMenu('${menu.id}')">
                    <img class="menu-card-img" src="${coverUrl}" alt="${title}" loading="lazy">
                    <div class="menu-card-overlay">
                        <h2 class="menu-card-title">${title}</h2>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        this.dom.content.innerHTML = html;
    },

    renderMenu() {
        const menu = this.data.menus.find(m => m.id === this.currentMenuId);
        if (!menu) {
            this.navigateHome();
            return;
        }

        const categories = menu.categories || [];
        
        // Si no hay búsqueda activa, renderizar barra de pestañas fija
        if (this.searchQuery === '') {
            let tabsHtml = '';
            categories.forEach(cat => {
                const name = cat.name[this.currentLang] || cat.name['es'] || '';
                tabsHtml += `<button id="tab-${cat.id}" class="category-tab" onclick="app.scrollToCategory('${cat.id}')">${name}</button>`;
            });
            this.dom.categoryTabs.innerHTML = tabsHtml;
            this.dom.categoryTabsContainer.style.display = categories.length > 0 ? 'block' : 'none';
        } else {
            this.dom.categoryTabsContainer.style.display = 'none';
            this.destroyCategoryTabsObserver();
        }

        let html = '';
        let matchCount = 0;

        categories.forEach(cat => {
            const catName = cat.name[this.currentLang] || cat.name['es'] || '';
            let dishesHtml = '';

            const dishes = cat.dishes || [];
            dishes.forEach(dish => {
                const name = dish.name[this.currentLang] || dish.name['es'] || '';
                const desc = dish.description ? (dish.description[this.currentLang] || dish.description['es'] || '') : '';
                const price = dish.price !== undefined ? `${dish.price.toFixed(2)} €` : '';
                
                // Filtro del buscador
                if (this.searchQuery !== '' && !name.toLowerCase().includes(this.searchQuery) && !desc.toLowerCase().includes(this.searchQuery)) {
                    return;
                }

                matchCount++;
                const imgHtml = dish.imageUrl ? `<img class="dish-img" src="${dish.imageUrl}" alt="${name}" loading="lazy">` : '';
                const actionButton = this.whatsapp.enabled ? 
                    `<button class="dish-add-btn">+</button>` : 
                    `<div class="dish-action-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>`;

                dishesHtml += `
                    <div class="dish fade-in-slide" data-dish-id="${dish.id}">
                        ${imgHtml}
                        <div class="dish-details">
                            <h3 class="dish-name">${name}</h3>
                            ${desc ? `<p class="dish-desc">${desc}</p>` : ''}
                            <div class="dish-bottom-row">
                                <span class="dish-price">${price}</span>
                                ${actionButton}
                            </div>
                        </div>
                    </div>
                `;
            });

            if (dishesHtml !== '') {
                html += `
                    <section id="cat-${cat.id}" class="category">
                        <h2 class="category-title">${catName}</h2>
                        ${dishesHtml}
                    </section>
                `;
            }
        });

        if (this.searchQuery !== '' && matchCount === 0) {
            html = `<div id="loader">${I18N[this.currentLang].emptySearch} "${this.searchQuery}"</div>`;
        } else if (html === '') {
            html = `<div id="loader">${I18N[this.currentLang].emptyMenu}</div>`;
        }

        this.dom.content.innerHTML = html;

        // Iniciar el procesador de scroll inteligente si no estamos buscando
        if (this.searchQuery === '') {
            setTimeout(() => this.setupCategoryTabsObserver(), 100);
        }
    },

    renderIntersectionAnimations() {
        const items = document.querySelectorAll('.fade-in-slide');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.05 });
        items.forEach(i => observer.observe(i));
    },

    // Buscar plato por ID dentro del árbol completo de datos
    findDish(dishId) {
        if (!this.data || !this.data.menus) return null;
        for (const menu of this.data.menus) {
            for (const cat of (menu.categories || [])) {
                const dish = (cat.dishes || []).find(d => d.id === dishId);
                if (dish) return dish;
            }
        }
        return null;
    },

    /* ========================================================
       SISTEMA DE POPUPS PREMIUM (REQUISITO CRÍTICO FOTO/TARJETA)
    ======================================================== */
    openModal(dishId) {
        const dish = this.findDish(dishId);
        if (!dish) return;

        const name = dish.name[this.currentLang] || dish.name['es'] || '';
        const desc = dish.description ? (dish.description[this.currentLang] || dish.description['es'] || '') : '';
        const price = dish.price !== undefined ? `${dish.price.toFixed(2)} €` : '';

        this.dom.modalTitle.textContent = name;
        this.dom.modalPrice.textContent = price;
        this.dom.modalDesc.textContent = desc;

        if (dish.imageUrl) {
            this.dom.modalImg.src = dish.imageUrl;
            this.dom.modalImgWrapper.style.display = 'block';
        } else {
            this.dom.modalImgWrapper.style.display = 'none';
        }

        this.dom.modal.classList.add('active');
        document.body.style.overflow = 'hidden'; // Bloquear scroll nativo de fondo
    },

    closeModal(e, force = false) {
        if (force || e.target === this.dom.modal) {
            this.dom.modal.classList.remove('active');
            document.body.style.overflow = '';
        }
    },

    /* ========================================================
       LÓGICA DEL GESTOR DE CARRITO Y WHATSAPP (100% INTACTO)
    ======================================================== */
    addToCart(dishId) {
        const dish = this.findDish(dishId);
        if (!dish) return;

        const existing = this.cart.find(item => item.id === dishId);
        if (existing) {
            existing.quantity++;
        } else {
            this.cart.push({
                id: dishId,
                name: dish.name[this.currentLang] || dish.name['es'] || '',
                price: dish.price || 0,
                quantity: 1
            });
        }
        this.updateCartFab();
    },

    updateCartFab() {
        if (!this.whatsapp.enabled || this.cart.length === 0) {
            this.dom.cartFab.style.display = 'none';
            return;
        }
        const totalItems = this.cart.reduce((sum, item) => sum + item.quantity, 0);
        this.dom.cartBadge.textContent = totalItems;
        this.dom.cartBadge.classList.add('visible');
        this.dom.cartFab.style.display = 'flex';
    },

    openCart() {
        const lang = this.currentLang;
        this.dom.cartModalTitle.textContent = I18N[lang].cartTitle;
        this.dom.cartTotalLabel.textContent = I18N[lang].cartTotal;
        this.dom.cartTableLabel.textContent = I18N[lang].cartTableLabel;
        this.dom.sendOrderBtn.textContent = I18N_WHATSAPP[this.whatsapp.msgLang || 'es'].orderBtn;

        this.renderCartItems();
        this.dom.cartModal.classList.add('active');
        document.body.style.overflow = 'hidden';
    },

    closeCart(e, force = false) {
        if (force || e.target === this.dom.cartModal) {
            this.dom.cartModal.classList.remove('active');
            document.body.style.overflow = '';
        }
    },

    renderCartItems() {
        this.dom.cartItemsContainer.innerHTML = '';
        if (this.cart.length === 0) {
            this.dom.cartItemsContainer.innerHTML = `<div style="text-align:center; padding: 20px; color:var(--text-muted);">${I18N[this.currentLang].cartEmpty}</div>`;
            this.dom.cartTotalPrice.textContent = '0,00 €';
            return;
        }

        let total = 0;
        this.cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;

            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-controls">
                    <button class="quantity-btn" onclick="app.updateQuantity('${item.id}', -1)">-</button>
                    <span class="cart-item-quantity">${item.quantity}</span>
                    <button class="quantity-btn" onclick="app.updateQuantity('${item.id}', 1)">+</button>
                </div>
                <div class="cart-item-price">${itemTotal.toFixed(2)} €</div>
            `;
            this.dom.cartItemsContainer.appendChild(div);
        });

        this.dom.cartTotalPrice.textContent = `${total.toFixed(2)} €`;
    },

    updateQuantity(dishId, change) {
        const item = this.cart.find(i => i.id === dishId);
        if (!item) return;

        item.quantity += change;
        if (item.quantity <= 0) {
            this.cart = this.cart.filter(i => i.id !== dishId);
        }
        
        this.renderCartItems();
        this.updateCartFab();
        if (this.cart.length === 0) {
            this.closeCart(null, true);
        }
    },

    sendOrder() {
        const table = this.dom.tableSelector.value;
        const msgLang = this.whatsapp.msgLang || 'es';
        
        if (this.tables.length > 0 && !table) {
            alert(I18N_WHATSAPP[msgLang].noTable);
            return;
        }

        let text = I18N_WHATSAPP[msgLang].header.replace('{table}', table || 'N/A') + '\n\n';
        this.cart.forEach(item => {
            text += I18N_WHATSAPP[msgLang].item.replace('{quantity}', item.quantity).replace('{name}', item.name) + '\n';
        });
        text += '\n' + I18N_WHATSAPP[msgLang].footer;

        const url = `https://api.whatsapp.com/send?phone=${this.whatsapp.phone}&text=${encodeURIComponent(text)}`;
        window.open(url, '_blank');
    }
};

window.addEventListener('DOMContentLoaded', () => app.init());
</script>

</body>
</html>
