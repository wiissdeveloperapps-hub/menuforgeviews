<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

    <style>
        /* GENERAL */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #f8f9fa;
            color: #212529;
            transition: background-color 0.3s, color 0.3s;
        }

        /* DARK MODE — CONTRASTE ALTO */
        body.dark-mode {
            background-color: #121212 !important;
            color: #f1f1f1 !important;
        }
        body.dark-mode header {
            background-color: #1e1e1e !important;
            color: #ffffff !important;
            border-bottom-color: #333 !important;
        }
        body.dark-mode .category-title {
            color: #ffffff !important;
            border-bottom-color: #4da3ff !important;
        }
        body.dark-mode .dish {
            background-color: #1c1c1c !important;
            color: #f1f1f1 !important;
            box-shadow: 0 2px 6px rgba(255,255,255,0.05) !important;
        }
        body.dark-mode .dish-name {
            color: #ffffff !important;
        }
        body.dark-mode .dish-desc {
            color: #d0d0d0 !important;
        }
        body.dark-mode .dish-price {
            color: #ffffff !important;
        }
        body.dark-mode .lang-selector-wrap {
            background-color: #2a2a2a !important;
            border-color: #555 !important;
        }
        body.dark-mode #language-selector {
            color: #ffffff !important;
        }
        body.dark-mode .btn-pdf {
            background-color: #c62828 !important;
        }
        body.dark-mode .btn-theme {
            background-color: #444 !important;
            color: #fff !important;
        }

        /* HEADER */
        header {
            background-color: #ffffff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #dee2e6;
        }

        #restaurant-logo {
            max-height: 80px;
            max-width: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        #restaurant-name {
            font-size: 2.2em;
            margin: 10px 0;
            font-weight: 700;
        }

        /* TOP BUTTONS */
        .top-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
        }

        /* LANGUAGE SELECTOR MODERNO */
        .lang-selector-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 8px;
            background: #fff;
            border: 1px solid #ced4da;
            cursor: pointer;
        }

        .lang-flag {
            width: 22px;
            height: 16px;
            border-radius: 3px;
            object-fit: cover;
        }

        #language-selector {
            border: none;
            background: transparent;
            font-size: 1em;
            cursor: pointer;
            padding-right: 4px;
        }

        /* BUTTONS */
        .btn {
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-pdf {
            background: #dc3545;
            color: white;
        }

        .btn-theme {
            background: #343a40;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3em;
        }

        /* MENU */
        #menu-container {
            padding: 20px;
            max-width: 800px;
            margin: 20px auto;
        }

        #loader {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
            color: #6c757d;
        }

        /* CATEGORY */
        .category {
            margin-bottom: 40px;
        }
        .category-title {
            font-size: 1.8em;
            font-weight: 600;
            color: #343a40;
            border-bottom: 3px solid #007bff;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        /* DISH */
        .dish {
            display: flex;
            gap: 15px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            overflow: hidden;
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .dish:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .dish-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .dish-details {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .dish-name {
            font-size: 1.25em;
            font-weight: bold;
            margin: 0 0 5px;
        }
        .dish-desc {
            color: #6c757d;
            margin: 0 0 10px;
            /* Truncar a 2 líneas para forzar a usar el popup */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .dish-bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }
        .dish-price {
            font-size: 1.3em;
            font-weight: bold;
            color: #000;
        }

        /* Selector visible en modo oscuro */
        body.dark-mode select,
        body.dark-mode select option {
            background-color: #2b2b2b !important;
            color: #ffffff !important;
        }

        /* Evita que el navegador fuerce su propio estilo */
        body.dark-mode select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            border: 1px solid #555 !important;
        }

        /* ========================================================
           NUEVAS FUNCIONALIDADES "ULTRA PROFESIONALES"
        ======================================================== */

        /* 1. ANIMACIONES DE ENTRADA (SLIDE-IN) */
        .fade-in-slide {
            opacity: 0;
            transform: translateX(-40px);
            transition: opacity 0.6s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .fade-in-slide.visible {
            opacity: 1;
            transform: translateX(0);
        }

        /* 2. BOTÓN DE OJO (VER MÁS) */
        .btn-view-more {
            background: rgba(0, 123, 255, 0.1);
            color: #007bff;
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .btn-view-more:hover {
            background: #007bff;
            color: #fff;
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 4px 10px rgba(0,123,255,0.3);
        }
        body.dark-mode .btn-view-more {
            background: rgba(77, 163, 255, 0.15);
            color: #4da3ff;
        }
        body.dark-mode .btn-view-more:hover {
            background: #4da3ff;
            color: #121212;
        }

        /* 3. MODAL POPUP (Efecto Glassmorphism) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: #ffffff;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: translateY(40px) scale(0.95);
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }
        body.dark-mode .modal-content {
            background: #1e1e1e;
            color: #f1f1f1;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1.2em;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, transform 0.3s;
        }
        .modal-close:hover {
            background: #dc3545;
            transform: scale(1.1);
        }
        .modal-img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            display: block;
        }
        .modal-body {
            padding: 30px;
        }
        .modal-title {
            font-size: 1.8em;
            font-weight: 800;
            margin: 0 0 15px;
            line-height: 1.2;
        }
        .modal-desc {
            color: #555;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        body.dark-mode .modal-desc {
            color: #bbb;
        }
        .modal-price {
            font-size: 1.8em;
            font-weight: bold;
            color: #007bff;
            display: inline-block;
            padding: 8px 16px;
            background: rgba(0, 123, 255, 0.1);
            border-radius: 12px;
        }
        body.dark-mode .modal-price {
            color: #4da3ff;
            background: rgba(77, 163, 255, 0.15);
        }

    </style>
</head>

<body>

<header id="header-container" style="display:none;">
    <img id="restaurant-logo" src="" alt="Logo del restaurante">
    <h1 id="restaurant-name"></h1>

    <div class="top-buttons">

        <div class="lang-selector-wrap">
            <img id="current-flag" class="lang-flag" src="assets/flags/es.png">
            <select id="language-selector"></select>
        </div>

        <button id="btn-pdf" class="btn btn-pdf">
            📄 PDF
        </button>

        <button id="btn-theme" class="btn-theme">
            🌙
        </button>

    </div>
</header>

<div id="menu-container">
    <div id="loader">Cargando menú...</div>
</div>

<div id="dish-modal" class="modal-overlay">
    <div class="modal-content">
        <button id="modal-close" class="modal-close">✖</button>
        <img id="modal-img" class="modal-img" src="" alt="Dish Image" style="display: none;">
        <div class="modal-body">
            <h3 id="modal-title" class="modal-title"></h3>
            <p id="modal-desc" class="modal-desc"></p>
            <div id="modal-price" class="modal-price"></div>
        </div>
    </div>
</div>

<script>
    const REPO_OWNER = 'wiissdeveloperapps-hub';
    const REPO_NAME = 'menuforgeviews';
    let fullMenuData = null;

    const dom = {
        loader: document.getElementById('loader'),
        header: document.getElementById('header-container'),
        restaurantLogo: document.getElementById('restaurant-logo'),
        restaurantName: document.getElementById('restaurant-name'),
        langSelector: document.getElementById('language-selector'),
        currentFlag: document.getElementById('current-flag'),
        menuContainer: document.getElementById('menu-container')
    };

    document.addEventListener('DOMContentLoaded', init);

    async function init() {
        try {
            const hash = window.location.hash.substring(1);
            let menuData;

            if (hash.startsWith('pako:')) {
                menuData = decompressPako(hash.substring(5));
            } else if (hash.startsWith('remote:')) {
                menuData = await fetchRemote(hash.substring(7));
            } else {
                showError('Formato de URL no válido o menú no encontrado.');
                return;
            }

            if (!menuData || !menuData.traducciones) {
                showError('No se pudieron cargar los datos del menú o el formato es incorrecto.');
                return;
            }
            setupUI(menuData);
        } catch (error) {
            console.error('Error al inicializar:', error);
            showError('Ha ocurrido un error al cargar el menú.');
        }
    }

    function decompressPako(base64String) {
        try {
            const compressed = atob(base64String).split('').map(c => c.charCodeAt(0));
            const decompressed = pako.inflate(new Uint8Array(compressed), { to: 'string' });
            return JSON.parse(decompressed);
        } catch (error) {
            console.error('Error al descomprimir:', error);
            throw new Error('Los datos del menú están corruptos.');
        }
    }

    async function fetchRemote(id) {
        const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/contents/menus/${id}.json`;
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error(`No se pudo encontrar el menú remoto (ID: ${id})`);
        }

        const rawText = await response.text();

        // Primero intentamos descomprimir. Si LZString devuelve null o "",
        // significa que el texto probablemente no estaba comprimido.
        let jsonString = LZString.decompressFromEncodedURIComponent(rawText);

        if (!jsonString) {
            // Si la descompresión falla, asumimos que el contenido es JSON sin comprimir (para compatibilidad con menús antiguos).
            console.warn("No se pudo descomprimir con LZString, intentando parsear como JSON directo.");
            jsonString = rawText;
        }

        try {
            return JSON.parse(jsonString);
        } catch (e) {
            console.error("Error final al parsear el JSON:", e, "Contenido recibido:", rawText);
            throw new Error('Error al analizar los datos del menú. El formato es incorrecto.');
        }
    }

    function setupUI(data) {
        fullMenuData = data;
        dom.loader.style.display = 'none';
        dom.header.style.display = 'block';

        dom.langSelector.innerHTML = '';

        Object.keys(fullMenuData.traducciones).forEach(langCode => {
            const option = document.createElement('option');
            option.value = langCode;
            option.textContent = fullMenuData.traducciones[langCode].meta.languageName;
            dom.langSelector.appendChild(option);
        });

        const browserLang = navigator.language.split('-')[0];
        const initialLang = fullMenuData.traducciones[browserLang] ? browserLang : Object.keys(fullMenuData.traducciones)[0];
        dom.langSelector.value = initialLang;

        // bandera inicial
        dom.currentFlag.src = `assets/flags/${initialLang}.png`;

        renderMenu(initialLang);

        dom.langSelector.addEventListener('change', (e) => {
            const lang = e.target.value;
            dom.currentFlag.src = `assets/flags/${lang}.png`;
            renderMenu(lang);
        });
    }

    // Función auxiliar para escapar texto y evitar romper el HTML
    function escapeHTML(str) {
        if (!str) return '';
        return String(str).replace(/[&<>"']/g, function(match) {
            return {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[match];
        });
    }

    function renderMenu(langCode) {
        if (!fullMenuData) return;
        const langData = fullMenuData.traducciones[langCode];
        if (!langData) {
            showError(`Traducción no disponible para: ${langCode}`);
            return;
        }

        dom.restaurantLogo.src = fullMenuData.logoRestaurante || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
        dom.restaurantName.textContent = langData.nombreRestaurante || fullMenuData.nombreRestaurante || 'Restaurante';
        document.body.className = `template-${fullMenuData.plantilla || 'moderna'}`;

        // Acceder al mapa de imágenes
        const imageMap = fullMenuData.recursos?.imagenes || {};

        let menuHtml = langData.categorias?.map(category => `
            <div class="category fade-in-slide">
                <h2 class="category-title">${category.nombre}</h2>
                ${category.platos?.map(dish => {
                    // Obtener la imagen del mapa de recursos usando idImagen
                    const imageUrl = dish.idImagen ? imageMap[dish.idImagen] : '';
                    const safeName = escapeHTML(dish.nombre);
                    const safeDesc = escapeHTML(dish.descripcion);
                    const safePrice = formatPrice(dish.precio);
                    
                    return `
                    <div class="dish">
                        ${imageUrl ? `<img class="dish-img" src="${imageUrl}" alt="${safeName}">` : ''}
                        <div class="dish-details">
                            <div class="dish-name">${safeName}</div>
                            <p class="dish-desc">${safeDesc}</p>
                            
                            <div class="dish-bottom-row">
                                <div class="dish-price">${safePrice}</div>
                                <button class="btn-view-more" 
                                    data-name="${safeName}" 
                                    data-desc="${safeDesc}" 
                                    data-price="${safePrice}" 
                                    data-img="${imageUrl}" 
                                    title="Ver Detalles">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `}).join('') || ''}
            </div>
        `).join('') || '<p>Este menú está vacío.</p>';

        dom.menuContainer.innerHTML = menuHtml;

        // Tras renderizar el HTML, activamos los efectos y el popup
        initScrollAnimations();
        initModalEvents();
    }

    function formatPrice(price) {
        if (typeof price !== 'number') return '';
        return price.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' });
    }

    function showError(message) {
        dom.loader.style.display = 'none';
        dom.menuContainer.innerHTML = `<p style="color: red; text-align: center; font-size: 1.2em;">${message}</p>`;
    }

    /* ========================================================
       LÓGICA DE ANIMACIONES Y MODAL
    ======================================================== */
    function initScrollAnimations() {
        const elements = document.querySelectorAll('.fade-in-slide');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    // Pequeño delay en cascada si aparecen varios a la vez
                    setTimeout(() => {
                        entry.target.classList.add('visible');
                    }, index * 100);
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.05, rootMargin: "0px 0px -50px 0px" });

        elements.forEach(el => observer.observe(el));
    }

    function initModalEvents() {
        const buttons = document.querySelectorAll('.btn-view-more');
        const modal = document.getElementById('dish-modal');
        const mImg = document.getElementById('modal-img');
        const mTitle = document.getElementById('modal-title');
        const mDesc = document.getElementById('modal-desc');
        const mPrice = document.getElementById('modal-price');
        const closeBtn = document.getElementById('modal-close');

        // Abrir modal
        buttons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const dataset = e.currentTarget.dataset;
                
                mTitle.innerHTML = dataset.name;
                mDesc.innerHTML = dataset.desc || '<i>No hay descripción disponible para este plato.</i>';
                mPrice.innerHTML = dataset.price;

                if (dataset.img) {
                    mImg.src = dataset.img;
                    mImg.style.display = 'block';
                } else {
                    mImg.style.display = 'none';
                    mImg.src = '';
                }

                modal.classList.add('active');
                document.body.style.overflow = 'hidden'; // Evita scroll de fondo
            });
        });

        // Cerrar modal
        const closeModal = () => {
            modal.classList.remove('active');
            document.body.style.overflow = ''; // Restaura scroll de fondo
        };

        closeBtn.onclick = closeModal;
        modal.onclick = (e) => {
            // Si el clic es en la parte oscura exterior (overlay), se cierra
            if (e.target === modal) closeModal();
        };
    }

    /* PDF */
    document.getElementById('btn-pdf').addEventListener('click', () => {
        window.print();
    });

    /* DARK MODE */
    document.getElementById('btn-theme').addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        document.getElementById('btn-theme').textContent =
            document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    });

</script>

</body>
</html>
